# 论坛服务配置
# 通过 spring.config.import 引入 common 模块的公共配置

server:
  port: 8089

spring:
  application:
    name: vaccine-forum-service

  # 引入公共配置
  config:
    import: optional:classpath:application-common.yml

  # 只配置服务特定的Redis数据库
  data:
    redis:
      database: 5


# MyBatis Plus - 只配置服务特定的包路径
mybatis-plus:
  type-aliases-package: com.vaccine.forum.entity

# 日志配置
logging:
  level:
    com.vaccine.forum: debug